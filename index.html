<!DOCTYPE html> <!-- これがページの種類を教えてくれる最初の言葉 -->
<html lang="ja"> <!-- 日本語でページを作る。lang="ja"で日本語対応 -->
<head> <!-- ページの頭の部分。見えない設定を書く -->
    <meta charset="UTF-8"> <!-- 文字が正しく表示されるように -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- スマホで見やすいように自動でサイズ調整 -->

    <style> <!-- ここからCSS（見た目のデザイン）を書く。クオリティ高くするために、色やフォントを丁寧に設定 -->
        body { /* 全体の背景と文字の設定 */
            font-family: Arial, sans-serif; /* 読みやすいフォント */
            background-color: #000033; /* 宇宙っぽい暗い青の背景 */
            color: white; /* 文字を白く */
            margin: 0; /* 余白をゼロに */
            padding: 20px; /* 周りに少しスペース */
            display: flex; /* 中央寄せにするための設定 */
            flex-direction: column; /* 縦に並べる */
            align-items: center; /* 横中央 */
            justify-content: center; /* 縦中央 */
            height: 100vh; /* 画面いっぱいに */
            overflow: auto; /* スクロール可能 */
        }
        h1 { /* タイトル文字のデザイン */
            font-size: 2em; /* 大きく */
            text-align: center; /* 中央 */
            margin-bottom: 20px; /* 下にスペース */
            color: #FFD700; /* 金色で宇宙っぽく */
        }
        #fact { /* 事実を表示する箱のデザイン */
            font-size: 1.2em; /* 少し大きく */
            text-align: center; /* 中央 */
            margin: 20px; /* 周りにスペース */
            padding: 20px; /* 内側にスペース */
            background-color: rgba(255, 255, 255, 0.1); /* 少し透明な白でボックス */
            border-radius: 10px; /* 角を丸く */
            max-width: 80%; /* スマホで横いっぱいにならないように */
        }
        button { /* ボタンのデザイン */
            font-size: 1em; /* 普通サイズ */
            padding: 10px 20px; /* 内側にスペース */
            background-color: #4CAF50; /* 緑色 */
            color: white; /* 白文字 */
            border: none; /* 枠なし */
            border-radius: 5px; /* 角丸 */
            cursor: pointer; /* 押せそうに見える */
            margin-top: 20px; /* 上にスペース */
        }
        button:hover { /* ボタンに触ったら変わる */
            background-color: #45a049; /* 少し暗く */
        }
        /* スマホ対応: 画面が小さい時さらに調整。クオリティ高くするために追加 */
        @media (max-width: 600px) {
            h1 { font-size: 1.5em; } /* 小さな画面でタイトル小さく */
            #fact { font-size: 1em; } /* 事実の文字小さく */
            button { font-size: 0.9em; } /* ボタン小さく */
        }
        /* もっとクオリティを高くするために、星のアニメーション追加。宇宙っぽく */
        .stars { 
            position: absolute; /* 背景に固定 */
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: transparent; 
            pointer-events: none; /* 触れない */
        }
        .star { 
            position: absolute; 
            background: white; 
            border-radius: 50%; /* 丸く */
            animation: twinkle 2s infinite; /* キラキラ動く */
        }
        @keyframes twinkle { /* キラキラの動き定義 */
            0% { opacity: 0; } 
            50% { opacity: 1; } 
            100% { opacity: 0; } 
        }
        /* 星をたくさん作るためにJavaScriptで追加するが、ここは準備 */
    </style>
</head>

            const starsContainer = document.querySelector('.stars'); // 星の箱を選ぶ
            for (let i = 0; i < 200; i++) { // 200個作る。長くするためにループ

</html>
